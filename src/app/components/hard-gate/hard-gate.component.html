<div class="hard-gate-overlay animate-in" *ngIf="isLocked">
    <div class="gate-modal card-pm">
        <div class="modal-content">
            <div class="icon-header">💎</div>
            <h2 class="modal-title">Atención</h2>
            <p class="modal-desc" [innerHTML]="message || 'Tu periodo de prueba ha finalizado o requiere atención.'"></p>
            <div class="btn-container mt-5">
                <button class="btn-activate btn-glow" (click)="goToPlans()">
                    VER PLANES Y ACTIVAR 90 DÍAS GRATIS
                </button>
            </div>
            <p class="footer-note">Podrás cancelar en cualquier momento antes de que termine el trial.</p>
        </div>
    </div>
</div>
